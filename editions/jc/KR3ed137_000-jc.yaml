body:
  text: 通用治氣聚心下不散者桃樹上不落干桃子去核皮取仁三兩為末每服二錢空心溫酒調下治絞腸痧痛不可忍鹽一兩熱湯調灌入病人口中鹽氣一到其痛即止治陽脫證四肢厥冷或因傷寒新瘥誤行房事小腹緊痛外腎搐縮不救則死蔥白連須三七根細切濾酒濃煮一碗分作三服灌之陽氣即回治自汗夜間盜汗五倍子末唾調填滿臍中縮定一宿即止又方浮麥炒為細末每服二錢米湯送下治痰嗽飛過白礬五倍子等分為末每服二錢以生豬肝火熱蘸藥食後臨臥服治吐血並鼻中出血藕節搗汁飲之治勞心吐血蓮心二十二粒為末酒調二錢食後服治鼻中出血千葉石榴花焙乾為末吹入鼻中即止治男子白濁女人帶下陳年冬瓜子仁炒為末每服五錢空心米湯調下治諸淋病小便赤澀疼痛三葉酸漿草洗淨搗汁一盞酒一盞攪勻空心服立通治五淋苧蔴根兩莖切碎水煎服效治睡中遺尿燕窠中草土為末不語食治小便不通蚯蚓搗碎以冷水濾濃汁飲半碗立通治痔瘡大便下血槐樹上木耳為末米湯調一錢日三服治痔漏蜣螂不以多少焙乾為末先用白礬水洗淨貼之治鼠乳痔蜘蛛絲纏其上自然消落矣治外痔鰻鱺熏糞門痔蟲皆死治脫肛鱉頭一枚燒炬盡為末傅肛門上用麻鞋底按入即不出治痢赤白薺菜根燒灰湯調下極效治諸痢鹽梅去核研一枚合茶湯加醋服之治血痢茶葉和蜜煎淺赤痢茶葉和生薑煎服甚效治泄瀉生薑二塊艾葉一把水煎熱服治狂言鬼語蝦蟆一個燒為末酒調服治發狂欲走瓜蒂半兩為末井水調服一錢大吐後熟睡即效治出路在家應急吐瀉方路傍破草鞋去兩頭將水洗過三四次伶俐煎水一大碗要甚滾方可吃即愈治面瘡枇杷葉布擦去毛炙乾為末食後茶湯調下二錢治泄精韭菜子二兩炒為末食前酒下二錢立愈治干瘡末藥方孩兒茶三錢片腦一分血竭乳香沒藥明礬煉過龍骨少許眼藥末遠年螺螄殼煉過上為末用好豬油搽上即愈治人面卒生黑丹如芥狀不急治遍身即死鹿角燒灰豬脂和塗之治耳腫小赤豆為末水調傅上立效治眼目赤腫翳痛鯉魚膽點之亦治耳盲治物入眼中好墨清水研箸點即出治飛絲入眼新筆於眼內攪之即收在筆上治耳聾鼠膽汁滴入耳中治耳痛鱔魚血滴入耳傅即愈治聤耳膿血不止白礬燒灰吹入耳中治百蟲入耳兩刀於耳相磨敲作聲即出治蜈蚣入耳自出治酒皶鼻白礬常擦為妙治鼻瘡杏仁研乳汁和傅或以鳥牛垢傅治牙疳燒筍乾為末入鹽擦之效治舌無故出血炒槐花為末摻之即愈治口瘡白礬一兩鐵勺內火熬干黃丹一兩炒紅色收下紫色為末摻瘡上治舌生瘡取東壁上土細研傅之又方縮砂火煅為末糝瘡上效治口唇緊小不能開合飲食不治即死白布作燈炷如指大安斧刀上燃燒令刀上汗出拭取傅唇上又方以蛇殼燒灰先拭淨傅之走馬疳大蜘蛛一枚濕紙裹外用荷葉包火煅令焦存性細研入少麝香傅之中暑盛暑遠行忽中暑昏悶在地急取地上熱土水調服又方大蒜三兩瓣同研尤砂凍腳瘡橄欖核燒灰存性為末入輕粉油調塗之治癰百藥箭白礬少許為細末以羊蹄根蘸擦之久年惡瘡多年石灰碾碎雞子清調成塊煅過候冷再為末薑汁調服金瘡並一切瘡雲母粉傅之絕妙骨鯁甚者以好炭皮洗淨搗為細末以米飲調服立愈婦人心痛荔枝核燒灰存性為末淡醋湯下男子小兒卒心痛荔枝核燒灰存性為末蚌粉湯亦效頭瘡乾地龍為末入輕粉麻油調傅之又方杏仁燒灰傅魚骨鯁在腹刺痛象末一錢蔥酒調下又方大慄殼燒灰研細熟水調下口瘡訶子黃柏燒灰存性入輕粉麝香摻之咽亦不妨口舌生瘡杏仁七個去皮尖輕粉少許同嚼吐涎即愈又方酸米醋含吐涎再含硼砂即愈大舌以半夏醋煎汨漱吐出即愈重舌五靈脂一兩去砂石為末用米醋一大碗同煎逐旋漱之口氣白礬枯為末入麝香青鹽各少許揩了吐出涎又方香白芷七錢甘草五寸為細末食後井花水調下一錢鼻氣右亭脂以紫色為上紅色次之黃色勿用先研令極細再滴水數點和研半日許臨臥隨多寡以冷水調勻痛擦患處明早浣去用之半月可絕患根腋氣石綠三錢重研細入輕粉一錢重和勻先拔去腋下毛令淨用酸醋調藥少許擦之五次可斷根又方以古破錢十數文鐵線串聚燒紅酸醋淬十次入麝香碾為細末調塗亦妙癜風赤癜白癜兩般風附子硫黃最有功薑汁調茄蒂蘸擦擦經兩度管無蹤又方去附子黃加磨石可療白癜又方雞子一枚酸醋浸過宿針刺小孔瀝取清液入砒霜綠豆許和勻將青布包擦患處以指點藥揩之亦妙頭癬紫貝草根以生白礬同擂爛塗患癬處所可斷根又方以砒霜少許滴醋同熬為膏搽之亦妙如覺癢不可以冷水洗切不可抓破又方班貓去頭足糯米炒黃去糯米以淮棗煮熟去皮取肉為丸唾調搽之尤妙手縫癬煎四物湯礬石末少許攙入同服再煎渣洗之甚妙去瘡瘢白獺髓雜玉屑琥珀屑塗之又方密陀僧末水調塗之烏髭不老旋化石灰廣四分真蛤粉三分鉛粉二分虢丹一分同為末臨臥以皂角湯洗髭冷水調藥連根均傅取蒸軟荷葉包裹以帛傅外至早浣去頻研核桃松子油滋之神妙點痣去瘢糯米百粒石灰拇指大巴豆餅藥少許入磁瓶內寄三日每以竹篦挑粟米許點痣處自然蝕落治唇緊燥裂生瘡橄欖不以多少燒灰豬脂和塗患處立效治癰疽發背惡瘡腫毒及毒蛇風犬所傷大蒜切片安腫上以艾灸之蒜熟更換新者初灸痛灸至不痛止初灸不痛灸至痛乃止治一切日久頑瘡不收斂者香油一兩松香五錢銀硃一錢千年地下灰五分上溶開蘸軟紙上用之又治臁瘡甚效臁瘡方輕粉五分黃蠟一兩上用熱鏊厚紙散粉上以蠟糝勻為度縛在瘡上黃水出即愈神傳齒藥神陰陽牢齒黑鬚發豬牙皂角及生薑西國升麻熟地黃木健旱蓮槐角子細辛荷葉要相當青鹽等分同燒煅研煞將來使最良惜牙固齒髭鬢黑誰知世上有仙方上藥神效真仙方也荷葉煎取近蒂心子近世名公多修用之有妙煅藥用新瓶入藥鹽泥固濟留口炭火燒煙盡即止治牙齒搖動鬢須憔悴養身不用煉丹砂每日清晨只擦牙牙皂七錢火煅過茯苓五倍細辛加每味二錢各等分自然功效入仙家二八之日君須見老來須鬢黑如鴉治鬢邊生軟癤豬頸上毛貓頸上毛各一撮燒灰鼠屎一粒為末以清油調服立愈治附骨疽久不瘥膿汁敗壞或骨從瘡孔中出大蝦蟆一個亂頭髮一握如雞子大豬油四兩同前久之濾去前藥滓凝如膏先以桑根皮烏頭煎湯洗拭乾煅龍骨末摻瘡四畔用前藥貼之治冬月手足開裂清油半兩以慢火煎沸入黃蠟一塊同煎候溶入光粉五倍子末少許熬令稠紫色為度先以熱湯洗火上烘乾用藥傅薄紙上貼之治杖瘡雄黃二分無名異一分細研水調傅極妙治瘡熱毒疼痛黃丹一兩密陀僧半兩輕粉一錢麝香五分龍腦一匙為末糝瘡上以青布蒙之中留一竅立效治刀斧傷牛膽石灰包裹定痛止血立瘥治破傷風蟬殼為末蔥涎調傅破處即時取去惡水立效治湯燙火燒多年廟上獸頭為末香油調傅立效又方葉燒存性為末雞子清調傅治骨鯁野苧麻搗碎丸如龍眼大魚骨鯁魚湯下雞骨鯁雞湯下通治諸鯁薤白煮令半熟以線系定少嚼咽之度至鯁處就便拽出即愈又方谷樹子泡湯嚥下骨自消治誤吞竹木不得出舊鋸子燒紅投酒中熱飲酒下治誤吞金銀銅錢入腹石灰一杏核大硫黃一皂子大研末酒調服治針刺折在肉中瓜蔞根搗爛傅上一日換三次自出牛膝草根嚼罨之立效治諸惡蟲傷蛇殼煮湯洗三兩度或以二粉生薑汁傅傷處治蜈蚣咬以鞋底擦之又方燈草蘸油點燈熏之雄蠍鱉人痛在一處井底泥傅之即愈簷下泥傅之或以白礬末水調先挑出黑刺即塗之立效治蜘蛛傷遍身成瘡青蔥葉一莖小頭作一孔盛蚯蚓一條捏兩頭勿令透氣搖動化為水點之立效治壁蝨蜈蚣萍曬乾燒煙薰之則去又方青鹽水灑床蓆比即絕治蜂蠆毒野芋葉擦之如不便急以手抓頭上垢膩傅之或用鹽擦或用人尿洗之治胡蜂蜜蜂螯以油木梳火上炙熱熨之治八腳蟲其蟲隱於壁間以尿射人遍身生瘡狀如湯火傷步虛丹龍骨一兩黃耆赤石脂防風桂心各一兩烏梅乾薑各二兩上為細末煉蜜為丸如彈子大欲遠行飽食罷服一丸酒送下一日可行二三百里若不行於膝下不過三寸用冷水略洗其藥力自消男婦腰痛方玄胡索肉桂當歸一方有杜仲各等分上為細末每服二三錢鹽湯調下食前酒服起油藥治濁汙衣服並顏色書畫等物龍骨一兩五錢滑石二兩烏魚骨二兩白蟮土一兩莙薘灰二兩上為細末摻汙處紙襯熨油汙多日者再用細細抹避蚊蟲法五月五日午時取老蝦蟆一個將好墨一片入在口內用紅線縛住用羅經甲定取正午方掘一穴深五寸埋蝦蟆於內至次日午時取出蝦蟆口中之墨每要用時將墨就壁上畫一葫蘆再將淨水噴三口在葫蘆上其蚊蟲盡入其中次日都不可打死欲去之即將扇輕輕搧去試著葫蘆再隨鬼轉靈但取墨時須要蝦蟆上驗死無驗除木蝨方鯁魚頭川山甲二件曬乾為末床下燒煙薰之木蝨盡死除頭上蝨方將細茶用口嚼爛勻調水銀搽於頭髮上其蝨即死除狗蚤方五月五日用熨斗燒棗一枚置床下狗蚤皆死闢蛇蠍方五月五日午時以硃砂寫茶字倒貼之蛇蠍不敢近闢蒼蠅方五月五日午時望太陽寫白字倒貼於四柱上則無蒼蠅闢臭蟲方以菖蒲鋪席下睡則少臭蟲食牛肉中毒以豬牙燒灰為末水調服二錢即愈食馬肉中毒飲好酒微醉即愈食狗肉中毒用杏仁二兩和皮研細以熱湯三盞拌勻分三服其狗肉皆全片瀉出即愈食豬肉中毒以燒豬糞為末水調服二三錢不過三服即愈急救食諸魚毒橘皮汁大豆汁馬鞭草汁紫蘇汁俱可解之急救食諸蕈毒掘地坑汲井水在內攪之連飲泥水數碗取吐即瘥急救中巴豆毒其症口渴臉赤五心煩熱利不止搗芭蕉根葉汁飲之即瘥急救天行熱病鬼臼一錢真者鬼箭羽一錢硃砂一錢雄黃一錢石菖蒲五分上煉蜜丸如大豆大每日米飲下二丸若與病人同床共衣將二丸塞鼻不染急救夏途熱死切不可以冷水灌及以冷物逼心急移陰涼處取路上熱土於死人臍上作窩令人溺其中又取路上熱土並蒜同研調去渣灌下即活急救冬途凍死及落水凍死微有氣者急脫去濕衣解生人熱衣包之用炒灰令熱以囊熨之心上冷即換之令暖氣通里以熱酒或薑湯灌之即活急救中砒霜毒好白蠟三五錢研細冷水灌下解之急救男婦縊死口閉捏拳者可救口開手散者不救頭莫放倒刺雞冠血滴入口中即活男用雌女用雄仍塗喉下更效急救木石壓死並跌磕傷從高墜下跌死氣絕不能言者急劈開口以熱小便灌之立效又方松節炒出煙入好生酒攙內儘量飲醉極佳急救六畜中毒以水服壁上黃土或地漿解之婦人治癰疽爛見心貓兒腹下毛耳窩內毛煅存性為末乾摻或清水調入輕粉少許傅之治有孕咳嗽貝母去心麩皮炒令黃麩皮為末研砂糖拌勻丸如雞頭大含化神效治胎漏蔥白一把濃煎汁飲之立效治觸動胎氣腹痛下血縮砂不拘多少於熨斗內炒透去皮取仁研為末每服二錢熱酒調下治難產清油一盞水一盞對和用銀簪打和飲之又方取夫褲帶五寸燒灰存性酒服又以皂角末少許吹入鼻中即生催生鳳仙子二錢研碎水下治逆生須臾不救母子俱亡蛇殼一條蟬退十四個頭髮一握並燒為灰分二服酒調並進二服仰臥霎時或用小繡針於小兒腳心刺三七刺用鹽少許擦刺處即時順生母子俱活治橫逆手足先出或子死腹中灶中心對鍋底下土細研每服一錢酒調治下死胎麝香半錢另研官桂末三錢和勻作一服溫酒調下須臾如手推下未放再服又方兒印不以多少黃色者去毛研為末每服二錢酒一盞煎八分通口服立效如神胞衣不下半夏白蘞一兩為末酒服一錢難產一服橫生二服倒生三服兒死四服神效又方草麻子十四粒去殼搗爛以白麵和成膏貼腳心胞衣下速洗去如腸出即以此藥塗頂心迴腸神效治產後血暈心悶氣絕腹內惡血不盡絞痛紅花酒煎或以藕汁二砂飲之效治產後子腸出不能救者枳殼去穰二兩煎湯溫浸良久即入小兒治小兒生下即死用法可救活急將兒口中懸雍前齶上有泡以手指摘破用帛拭血令淨若血入喉即不可治治小兒初生氣欲絕不能啼者必是難產或冒寒所致急以綿絮包裹抱懷中未可斷臍帶且將胞衣置炭爐中燒之仍作大紙燃蘸油點火著臍帶上往來燎之更以熱醋湯蕩洗臍帶須臾氣回啼哭如常方可洗浴了卻斷臍帶治小兒初生大小便不通及不飲乳蔥白二寸破作四界以乳汁砂鍋內煎灌之立效治小兒吐乳田中蚯蚓泥為末米飲調下治小兒吐不定五倍子二個一生一熟甘草一根用濕紙裹煨米汁調下半錢效治小兒卒驚似有痛傷而不知狀雄雞血滴入口中效治小兒夜啼燈草燒灰抹乳上與吃燈花尤妙治小兒寸白蟲酸石榴東引根二兩糯米三十粒水一碗煎空心服須臾瀉下便不生疾痛治痘瘡出不透腹痛甚或黑靨者蟬殼二十五個去翅足淨洗為末每服一錢熱酒調下乳母亦服一錢治痘瘡黑陷人牙齒燒存性為末每個作一服酒調下治痘瘡入眼浮萍陰乾為末以羊子肝半個入盞內以杖刺碎爛投水半合攪取汁調下食後服每服三錢治痘瘡爛成片黃牛糞干傅膿多者乾淨黃土傅之瘡遍口中不能食者蜜浸黃柏皮取汁啖之凡瘡欲成痂類以面油乳酥清蜜潤之可揭血出無害治痘瘡爬搔成瘡膿血淋漓多年蓋屋爛草曬乾為末乾摻甚效治痘瘡欲發未發便發此藥以毒攻毒縱然瘡出亦少快無惡證冬月取大貓豬犬糞各等分埋於高處黃土窖吉日取出用砂鍋盛蓋鹽泥固濟曬乾於臘八日煅令通紅取以碗合地上一宿出火氣為末入麝香少許每用一字以蜜調勻溫湯化下或挑少許於舌上用乳汁嚥下此方捷效多秘不須病家知之治口角爛瘡亂髮燒灰為末豬脂和傅治頭上軟癤白礬為末清油調傅效又方桃樹上不落干桃子燒灰清油調傅甚效治遺尿雞肫腸一具燒存性豬尿胞一個炙焦為末每服一錢酒調下男用雌女用雄如法即效
